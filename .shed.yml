name: agrvate
owner: ajkarloss
description: "AgrVATE Galaxy wrapper for typing the agr locus in Staphylococcus aureus assemblies"
long_description: |
  AgrVATE identifies the accessory gene regulator (agr) group of
  Staphylococcus aureus genome assemblies. This Galaxy wrapper runs AgrVATE
  in typing-only mode and reports the per-sample agr typing summary and the
  underlying agr group hits table.
categories:
  - Sequence Analysis
remote_repository_url: "https://github.com/NorwegianVeterinaryInstitute/agrvate-galaxy/tree/main"
homepage_url: "https://github.com/VishnuRaghuram94/AgrVATE"
type: unrestricted
